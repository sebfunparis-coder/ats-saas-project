# Configuration Nginx pour ATS SaaS Platform
# Fichier : /etc/nginx/sites-available/ats-saas

server {
    listen 80;
    listen [::]:80;
    
    # Remplacer par votre nom de domaine
    server_name votredomaine.com www.votredomaine.com;
    
    # Chemin vers les fichiers buildés
    root /var/www/ats-saas;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/ats-saas-access.log;
    error_log /var/log/nginx/ats-saas-error.log;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml+rss
        application/json
        image/svg+xml;
    gzip_comp_level 6;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # SPA routing - tous les chemins vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Pas de cache pour index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
    
    # Bloquer .git et autres fichiers sensibles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

