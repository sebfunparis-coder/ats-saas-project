# Nginx — api.ats-ultimate.com (Backend Express)
# Fichier séparé pour le sous-domaine API.
# Remplacer ats-ultimate.com par votre vrai domaine partout.

# HTTP → HTTPS
server {
    listen 80;
    server_name api.ats-ultimate.com;
    return 301 https://$host$request_uri;
}

# HTTPS — Reverse proxy vers le backend Node.js (port 5000)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.ats-ultimate.com;

    # Certificat SSL (certbot --nginx -d api.ats-ultimate.com)
    ssl_certificate     /etc/letsencrypt/live/api.ats-ultimate.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ats-ultimate.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CORS — autoriser uniquement le domaine frontend
    set $cors_origin "";
    if ($http_origin ~* "^https://(ats-ultimate\.com|www\.ats-ultimate\.com)$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

    # Répondre aux preflight OPTIONS directement
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Proxy principal
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 15m;
    }

    # SSE — Server-Sent Events (stream temps réel, pas de buffering)
    location /api/sse {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Health check (monitoring, pas de logs)
    location = /health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }

    # Swagger UI (relaxer CSP pour les assets inline)
    location /api/docs {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        # Swagger nécessite unsafe-inline pour ses styles
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' blob:; img-src 'self' data:;" always;
    }

    # Uploads — fichiers statiques protégés (JWT requis via Express)
    location /uploads {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 15m;
    }

    # Rate limit au niveau Nginx (couche supplémentaire avant Express)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;

    location /api/auth {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/upload {
        limit_req zone=api_upload burst=3 nodelay;
        proxy_pass http://127.0.0.1:5000;
        client_max_body_size 15m;
    }

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_comp_level 6;
    gzip_min_length 1000;

    # Logs
    access_log /var/log/nginx/api.ats-ultimate.access.log combined;
    error_log  /var/log/nginx/api.ats-ultimate.error.log warn;
}
